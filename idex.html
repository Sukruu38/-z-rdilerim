<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benimle Barışır Mısın? 🥺</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: #d63031;
            font-size: 2.5rem;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            position: relative;
            width: 300px;
            height: 50px;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease;
        }

        #yesBtn {
            background-color: #2ecc71;
            color: white;
            z-index: 10;
        }

        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <h1 id="question">Benimle barışır mısın? 🌹</h1>

    <div class="buttons">
        <button id="yesBtn" onclick="celebrate()">Evet</button>
        <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">Hayır</button>
    </div>

    <script>
        // "Hayır" butonunu kaçıran fonksiyon
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Ekran sınırları içinde rastgele bir pozisyon hesapla
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            // Butonu yeni yerine ışınla
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // "Evet"e basınca ne olacak?
        function celebrate() {
            document.getElementById('question').innerHTML = "Oleyyy! Seni çok seviyorum! ❤️🎉";
            document.querySelector('.buttons').style.display = 'none';
        }
    </script>

</body>
</html>
